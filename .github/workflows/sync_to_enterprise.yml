name: Sync to Enterprise

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to enterprise repo
        env:
          TOKEN: ${{ secrets.ENTERPRISE_REPO_TOKEN }}
        run: |
          # 使用 gh CLI
          echo "Checking gh auth..."
          echo "$TOKEN" | gh auth login --hostname github.com --with-token
          
          gh auth status
          
          echo "Setting up git remote..."
          git remote add enterprise https://github.com/cedar-v/license-manager-enterprise.git
          
          echo "Pushing to enterprise..."
          git push enterprise main:license-manager --force
          
          echo "Done!"
