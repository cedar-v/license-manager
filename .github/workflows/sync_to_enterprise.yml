name: Sync to Enterprise

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to enterprise repo
        env:
          TOKEN: ${{ secrets.ENTERPRISE_REPO_TOKEN }}
        run: |
          # 设置 git config
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 用认证 URL
          REPO_URL="https://x-access-token:$TOKEN@github.com/cedar-v/license-manager-enterprise.git"
          
          echo "Cloning enterprise repo..."
          git clone "$REPO_URL" /tmp/enterprise-repo
          
          cd /tmp/enterprise-repo
          
          # 清理 enterprise repo 里的 .git（避免复制过来的）
          rm -rf .git
          
          # 从原始仓库复制文件，排除 .git 目录
          cd "$GITHUB_WORKSPACE"
          cp -r . /tmp/enterprise-repo/
          
          cd /tmp/enterprise-repo
          git init
          git add -A
          git -c "user.email=github-actions[bot]@users.noreply.github.com" \
              -c "user.name=github-actions[bot]" \
              commit -m "Sync from license-manager - $(date)" || echo "Nothing to commit"
          
          # 显式设置 remote 并 push
          git remote add enterprise "$REPO_URL"
          git push enterprise master --force
          
          echo "Done!"
