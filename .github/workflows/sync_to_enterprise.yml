name: Sync to Enterprise

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add enterprise remote
        run: |
          echo "Adding enterprise remote..."
          TOKEN="${{ secrets.ENTERPRISE_REPO_TOKEN }}"
          echo "Token prefix: ${TOKEN:0:10}"
          git remote add enterprise https://x-access-token:$TOKEN@github.com/cedar-v/license-manager-enterprise.git
          echo "Remote added successfully"

      - name: Verify remote and push
        env:
          TOKEN: "${{ secrets.ENTERPRISE_REPO_TOKEN }}"
        run: |
          echo "Verifying remote exists..."
          # 先测试是否能访问
          if git ls-remote enterprise 2>&1; then
            echo "Remote accessible, pushing..."
            git push enterprise main:license-manager --force
            echo "Push completed successfully!"
          else
            echo "Failed to access remote"
            exit 1
          fi
